<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">Iron Forge Prague lineup</title>
  <desc id="desc">Original lineup collage with six custom festival-style performer visuals.</desc>
  <rect width="1200" height="700" fill="#0f0d14"/>
  <rect x="55" y="60" width="340" height="250" rx="18" fill="#1d3553"/>
  <rect x="430" y="60" width="340" height="250" rx="18" fill="#3b1620"/>
  <rect x="805" y="60" width="340" height="250" rx="18" fill="#173231"/>
  <rect x="55" y="350" width="340" height="250" rx="18" fill="#3a0d0c"/>
  <rect x="430" y="350" width="340" height="250" rx="18" fill="#1d1d1d"/>
  <rect x="805" y="350" width="340" height="250" rx="18" fill="#231f49"/>
  <text x="100" y="205" fill="#d6eeff" font-size="54" font-family="Trebuchet MS, Verdana, sans-serif" font-weight="700">Metallica</text>
  <text x="475" y="205" fill="#ffd2a8" font-size="54" font-family="Trebuchet MS, Verdana, sans-serif" font-weight="700">Iron Maiden</text>
  <text x="850" y="205" fill="#bffcf1" font-size="54" font-family="Trebuchet MS, Verdana, sans-serif" font-weight="700">Megadeth</text>
  <text x="155" y="495" fill="#ffd9b1" font-size="54" font-family="Trebuchet MS, Verdana, sans-serif" font-weight="700">Slayer</text>
  <text x="485" y="495" fill="#f1f1f1" font-size="54" font-family="Trebuchet MS, Verdana, sans-serif" font-weight="700">Slipknot</text>
  <text x="850" y="495" fill="#e1e3ff" font-size="54" font-family="Trebuchet MS, Verdana, sans-serif" font-weight="700">Nightwish</text>
  <text x="70" y="655" fill="#f8f1e8" font-size="84" font-family="Trebuchet MS, Verdana, sans-serif" font-weight="700" letter-spacing="5">IRON FORGE PRAGUE 2026</text>
</svg>
