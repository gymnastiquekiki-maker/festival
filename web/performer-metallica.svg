  <polygon points="1020,105 1080,255 985,255 1120,460 1070,300 1160,300" fill="#d7f2ff" opacity=".8"/>
  <rect x="365" y="195" width="470" height="235" rx="18" fill="#101820" stroke="#89cfff" stroke-width="4"/>
