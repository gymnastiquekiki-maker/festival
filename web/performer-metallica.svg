<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">Metallica</title>
  <desc id="desc">Original artwork inspired by thrash metal energy, lightning, and a stadium stage.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0c1420"/>
      <stop offset="100%" stop-color="#1d3553"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="700" fill="url(#bg)"/>
  <path d="M0 540L160 470L360 520L600 430L820 500L1200 420V700H0Z" fill="#081018"/>
