<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">Steel Stage</title>
  <desc id="desc">Stylized metal festival stage in steel-blue colors with trusses and spotlights.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a1118" />
      <stop offset="55%" stop-color="#152635" />
      <stop offset="100%" stop-color="#314b63" />
    </linearGradient>
    <linearGradient id="floor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#183147" />
      <stop offset="100%" stop-color="#091117" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <rect width="1200" height="700" fill="url(#bg)" />
  <circle cx="1010" cy="120" r="95" fill="#aac8de" opacity=".1" />
  <path d="M0 560L170 470L340 520L520 430L690 500L875 405L1030 470L1200 410V700H0Z" fill="url(#floor)" />
  <rect x="188" y="170" width="824" height="352" rx="20" fill="#10161d" stroke="#7998b3" stroke-width="5" />
  <rect x="232" y="205" width="736" height="258" rx="12" fill="#1a2835" />
  <g stroke="#8eb3d1" stroke-width="8" opacity=".9">
    <line x1="220" y1="170" x2="220" y2="525" />
    <line x1="980" y1="170" x2="980" y2="525" />
    <line x1="188" y1="210" x2="1012" y2="210" />
    <line x1="188" y1="485" x2="1012" y2="485" />
  </g>
  <g fill="#b8d7f2" opacity=".8" filter="url(#glow)">
    <path d="M305 165L255 345H355Z" />
    <path d="M490 165L440 345H540Z" />
    <path d="M680 165L630 345H730Z" />
    <path d="M865 165L815 345H915Z" />
  </g>
  <g fill="#d7e8f8">
    <rect x="320" y="325" width="560" height="105" rx="12" opacity=".12" />
    <rect x="420" y="450" width="360" height="20" rx="8" opacity=".2" />
    <rect x="410" y="470" width="22" height="70" />
    <rect x="768" y="470" width="22" height="70" />
    <rect x="468" y="465" width="264" height="18" rx="9" />
  </g>
  <text x="90" y="585" fill="#e7f3ff" font-size="88" font-family="Trebuchet MS, Verdana, sans-serif" font-weight="700" letter-spacing="4">STEEL STAGE</text>
  <text x="92" y="635" fill="#aac8de" font-size="28" font-family="Trebuchet MS, Verdana, sans-serif" letter-spacing="3">Industrial arena with cold beams and massive trusswork</text>
</svg>
