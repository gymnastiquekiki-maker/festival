openapi: 3.1.0
info:
  title: Iron Forge Prague API
  version: 1.2.0
  summary: Staticke JSON endpointy pro data festivalu Iron Forge Prague 2026
  description: >-
    API popisuje skutecne JSON vystupy generovane z XML zdroje
    `data/festival.xml` pomoci XSLT transformaci. Jednotlive endpointy
    odpovidaji souborum v `data/json/`.
servers:
  - url: https://example.com/api
    description: Produkcni API
  - url: http://localhost:8000/data/json
    description: Lokalni staticke JSON vystupy projektu
paths:
  /info.json:
    get:
      summary: Zakladni informace o festivalu ve formatu JSON
      description: Vrati jeden objekt se zakladnimi informacemi o festivalu.
      responses:
        '200':
          description: Uspech
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FestivalInfo'
              example:
                name: Iron Forge Prague
                edition: 5
                location: Nakladove nadrazi Zizkov, Praha
                start_date: '2026-08-14'
                end_date: '2026-08-16'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
  /venues.json:
    get:
      summary: Seznam scen ve formatu JSON
      description: Vrati vsechny sceny jako JSON pole.
      responses:
        '200':
          description: Uspech
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Venue'
              example:
                - id: v1
                  name: Steel Stage
                - id: v2
                  name: Pyro Hall
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
  /performers.json:
    get:
      summary: Seznam interpretu ve formatu JSON
      description: Vrati vsechny interprety jako JSON pole.
      responses:
        '200':
          description: Uspech
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Performer'
              example:
                - id: p1
                  name: Metallica
                - id: p2
                  name: Iron Maiden
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
  /events.json:
    get:
      summary: Program festivalu ve formatu JSON
      description: Vrati program festivalu jako JSON pole.
      responses:
        '200':
          description: Uspech
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Event'
              example:
                - id: e1
                  venue_id: v1
                  performer_id: p1
                  date: '2026-08-14'
                  time: '18:00'
                - id: e2
                  venue_id: v2
                  performer_id: p16
                  date: '2026-08-14'
                  time: '18:00'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
components:
  responses:
    BadRequest:
      description: Neplatny pozadavek.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error: bad_request
            message: Pozadavek nelze zpracovat.
            status: 400
    NotFound:
      description: Pozadovany zdroj nebyl nalezen.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error: not_found
            message: Pozadovany zaznam neexistuje.
            status: 404
  schemas:
    FestivalInfo:
      type: object
      additionalProperties: false
      required:
        - name
        - edition
        - location
        - start_date
        - end_date
      properties:
        name:
          type: string
          minLength: 1
        edition:
          type: integer
          minimum: 1
          maximum: 99
        location:
          type: string
          minLength: 5
          maxLength: 120
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date
    Venue:
      type: object
      additionalProperties: false
      required:
        - id
        - name
      properties:
        id:
          type: string
          pattern: '^v[1-9]\d*$'
        name:
          type: string
          minLength: 1
    Performer:
      type: object
      additionalProperties: false
      required:
        - id
        - name
      properties:
        id:
          type: string
          pattern: '^p[1-9]\d*$'
        name:
          type: string
          minLength: 1
    Event:
      type: object
      additionalProperties: false
      required:
        - id
        - venue_id
        - performer_id
        - date
        - time
      properties:
        id:
          type: string
          pattern: '^e[1-9]\d*$'
        venue_id:
          type: string
          pattern: '^v[1-9]\d*$'
        performer_id:
          type: string
          pattern: '^p[1-9]\d*$'
        date:
          type: string
          format: date
        time:
          type: string
          pattern: '^([01]\d|2[0-3]):[0-5]\d$'
    ErrorResponse:
      type: object
      additionalProperties: false
      required:
        - error
        - message
        - status
      properties:
        error:
          type: string
          enum:
            - bad_request
            - not_found
        message:
          type: string
          minLength: 1
        status:
          type: integer
          enum: [400, 404]
