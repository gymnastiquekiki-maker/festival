openapi: 3.1.0
info:
  title: Iron Forge Prague API
  version: 1.1.0
  summary: REST API pro data festivalu Iron Forge Prague 2026
  description: >-
    API vraci JSON vystupy generovane z XML zdroje `data/festival.xml` pomoci
    XSLT transformaci. Schematy odpovidaji souborum v `data/json/`.
servers:
  - url: https://example.com/api
    description: Produkcni API
  - url: http://localhost:8000/data/json
    description: Lokalni staticke JSON vystupy projektu
paths:
  /info:
    get:
      summary: Zakladni informace o festivalu
      description: Vrati jeden objekt se zakladnimi informacemi o festivalu.
      parameters:
        - $ref: '#/components/parameters/ResponseFormat'
      responses:
        '200':
          description: Uspech
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FestivalInfo'
              example:
                name: Iron Forge Prague
                edition: 5
                location: Nákladové nádraží Žižkov, Praha
                start_date: '2026-08-14'
                end_date: '2026-08-16'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
  /venues:
    get:
      summary: Seznam scen
      description: Vrati vsechny sceny nebo filtr podle identifikatoru.
      parameters:
        - $ref: '#/components/parameters/VenueIdQuery'
        - $ref: '#/components/parameters/LimitQuery'
      responses:
        '200':
          description: Uspech
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Venue'
              example:
                - id: v1
                  name: Steel Stage
                - id: v2
                  name: Pyro Hall
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
  /venues/{venueId}:
    get:
      summary: Detail sceny
      description: Vrati jednu scenu podle identifikatoru.
      parameters:
        - $ref: '#/components/parameters/VenueIdPath'
      responses:
        '200':
          description: Uspech
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Venue'
              example:
                id: v1
                name: Steel Stage
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
  /performers:
    get:
      summary: Seznam interpretu
      description: Vrati vsechny interprety nebo filtrovany vyber podle ID.
      parameters:
        - $ref: '#/components/parameters/PerformerIdQuery'
        - $ref: '#/components/parameters/LimitQuery'
      responses:
        '200':
          description: Uspech
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Performer'
              example:
                - id: p1
                  name: Metallica
                - id: p2
                  name: Iron Maiden
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
  /performers/{performerId}:
    get:
      summary: Detail interpreta
      description: Vrati jednoho interpreta podle identifikatoru.
      parameters:
        - $ref: '#/components/parameters/PerformerIdPath'
      responses:
        '200':
          description: Uspech
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Performer'
              example:
                id: p1
                name: Metallica
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
  /events:
    get:
      summary: Program festivalu
      description: >-
        Vrati seznam programu. Podporuje filtrovani podle data, sceny nebo
        interpreta.
      parameters:
        - $ref: '#/components/parameters/EventDateQuery'
        - $ref: '#/components/parameters/VenueIdQuery'
        - $ref: '#/components/parameters/PerformerIdQuery'
        - $ref: '#/components/parameters/LimitQuery'
      responses:
        '200':
          description: Uspech
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Event'
              example:
                - id: e1
                  venue_id: v1
                  performer_id: p1
                  date: '2026-08-14'
                  time: '18:00'
                - id: e2
                  venue_id: v2
                  performer_id: p16
                  date: '2026-08-14'
                  time: '18:00'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
  /events/{eventId}:
    get:
      summary: Detail programove polozky
      description: Vrati jednu programovou polozku podle identifikatoru.
      parameters:
        - $ref: '#/components/parameters/EventIdPath'
      responses:
        '200':
          description: Uspech
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Event'
              example:
                id: e1
                venue_id: v1
                performer_id: p1
                date: '2026-08-14'
                time: '18:00'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
components:
  parameters:
    ResponseFormat:
      name: format
      in: query
      required: false
      description: Podporovany format odpovedi.
      schema:
        type: string
        enum: [json]
        default: json
    LimitQuery:
      name: limit
      in: query
      required: false
      description: Maximalni pocet vracenych zaznamu.
      schema:
        type: integer
        minimum: 1
        maximum: 100
    VenueIdQuery:
      name: venue_id
      in: query
      required: false
      description: Filtr podle ID sceny.
      schema:
        type: string
        pattern: '^v[1-9]\d*$'
    PerformerIdQuery:
      name: performer_id
      in: query
      required: false
      description: Filtr podle ID interpreta.
      schema:
        type: string
        pattern: '^p[1-9]\d*$'
    EventDateQuery:
      name: date
      in: query
      required: false
      description: Filtr podle data festivalu.
      schema:
        type: string
        format: date
    VenueIdPath:
      name: venueId
      in: path
      required: true
      description: Jedinecne ID sceny.
      schema:
        type: string
        pattern: '^v[1-9]\d*$'
    PerformerIdPath:
      name: performerId
      in: path
      required: true
      description: Jedinecne ID interpreta.
      schema:
        type: string
        pattern: '^p[1-9]\d*$'
    EventIdPath:
      name: eventId
      in: path
      required: true
      description: Jedinecne ID programove polozky.
      schema:
        type: string
        pattern: '^e[1-9]\d*$'
  responses:
    BadRequest:
      description: Neplatny parametr pozadavku.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error: bad_request
            message: Parametr performer_id ma neplatny format.
            status: 400
    NotFound:
      description: Pozadovany zdroj nebyl nalezen.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error: not_found
            message: Pozadovany zaznam neexistuje.
            status: 404
  schemas:
    FestivalInfo:
      type: object
      additionalProperties: false
      required:
        - name
        - edition
        - location
        - start_date
        - end_date
      properties:
        name:
          type: string
          minLength: 1
        edition:
          type: integer
          minimum: 1
          maximum: 99
        location:
          type: string
          minLength: 5
          maxLength: 120
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date
    Venue:
      type: object
      additionalProperties: false
      required:
        - id
        - name
      properties:
        id:
          type: string
          pattern: '^v[1-9]\d*$'
        name:
          type: string
          minLength: 1
    Performer:
      type: object
      additionalProperties: false
      required:
        - id
        - name
      properties:
        id:
          type: string
          pattern: '^p[1-9]\d*$'
        name:
          type: string
          minLength: 1
    Event:
      type: object
      additionalProperties: false
      required:
        - id
        - venue_id
        - performer_id
        - date
        - time
      properties:
        id:
          type: string
          pattern: '^e[1-9]\d*$'
        venue_id:
          type: string
          pattern: '^v[1-9]\d*$'
        performer_id:
          type: string
          pattern: '^p[1-9]\d*$'
        date:
          type: string
          format: date
        time:
          type: string
          pattern: '^([01]\d|2[0-3]):[0-5]\d$'
    ErrorResponse:
      type: object
      additionalProperties: false
      required:
        - error
        - message
        - status
      properties:
        error:
          type: string
          enum:
            - bad_request
            - not_found
        message:
          type: string
          minLength: 1
        status:
          type: integer
          enum: [400, 404]
