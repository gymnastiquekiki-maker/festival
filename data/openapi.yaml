openapi: 3.1.0
info:
  title: Iron Forge Prague API
  version: 3.0.0
  summary: REST API popis festivalovych dat generovanych z XML zdroje
  description: >-
    Specifikace popisuje REST API nad daty festivalu Iron Forge Prague 2026.
    Skutecne ukazkove odpovedi jsou generovany z `data/festival.xml` pomoci XSLT
    do statickych JSON souboru ve slozce `7xAPI/json/`.
servers:
  - url: https://example.com
    description: Produkcni REST API
  - url: http://localhost:8000
    description: Lokalni server projektu
paths:
  /api/festival:
    get:
      summary: Identita festivalu, vstupenky, popis, datumy a odkazy
      responses:
        '200':
          description: Uspech
          content:
            application/json:
              schema:
                $ref: './json-schema/festival.schema.json'
              example:
                name: Iron Forge Prague
                edition: 5
                location: Nákladové nádraží Žižkov, Praha
                description: Třídenní metalový festival v industriálním prostoru s důrazem na silný line-up, pyrotechniku a komunitní atmosféru.
                start_date: '2026-08-14'
                end_date: '2026-08-16'
                tickets:
                  - code: day
                    name: Jednodenní
                    price_czk: 1290
                    description: Vstup na jeden vybraný den festivalu.
                  - code: full
                    name: Třídenní
                    price_czk: 2990
                    description: Plný přístup na všechny scény po celou dobu akce.
                  - code: vip
                    name: VIP
                    price_czk: 4990
                    description: VIP vstup, vyhrazená zóna a rychlejší odbavení.
                links:
                  homepage: index.html
                  program: program.html
                  performers: performers.html
                  practical_info: info.html
                  xml_source: festival.xml
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/venues:
    get:
      summary: Seznam mist a scen
      responses:
        '200':
          description: Uspech
          content:
            application/json:
              schema:
                $ref: './json-schema/venues.schema.json'
              example:
                - id: v1
                  name: Steel Stage
                - id: v2
                  name: Pyro Hall
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/venues/{id}:
    get:
      summary: Detail konkretni sceny
      parameters:
        - $ref: '#/components/parameters/VenueIdPath'
      responses:
        '200':
          description: Uspech
          content:
            application/json:
              schema:
                $ref: './json-schema/venue.schema.json'
              example:
                id: v1
                name: Steel Stage
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/performers:
    get:
      summary: Seznam ucinkujicich
      responses:
        '200':
          description: Uspech
          content:
            application/json:
              schema:
                $ref: './json-schema/performers.schema.json'
              example:
                - id: p1
                  name: Metallica
                - id: p2
                  name: Iron Maiden
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/performers/{id}:
    get:
      summary: Detail konkretniho interpreta
      parameters:
        - $ref: '#/components/parameters/PerformerIdPath'
      responses:
        '200':
          description: Uspech
          content:
            application/json:
              schema:
                $ref: './json-schema/performer.schema.json'
              example:
                id: p1
                name: Metallica
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/events:
    get:
      summary: Program festivalu
      parameters:
        - $ref: '#/components/parameters/EventDayQuery'
        - $ref: '#/components/parameters/VenueIdQuery'
        - $ref: '#/components/parameters/PerformerIdQuery'
        - $ref: '#/components/parameters/PageQuery'
        - $ref: '#/components/parameters/PageSizeQuery'
      responses:
        '200':
          description: Uspech
          content:
            application/json:
              schema:
                $ref: './json-schema/events.schema.json'
              example:
                items:
                  - id: e1
                    venue_id: v1
                    performer_id: p1
                    date: '2026-08-14'
                    time: '18:00'
                  - id: e2
                    venue_id: v2
                    performer_id: p16
                    date: '2026-08-14'
                    time: '18:00'
                page: 1
                pageSize: 60
                totalItems: 60
                totalPages: 1
                filters:
                  day: null
                  venueId: null
                  performerId: null
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/events/{id}:
    get:
      summary: Detail konkretni programove polozky
      parameters:
        - $ref: '#/components/parameters/EventIdPath'
      responses:
        '200':
          description: Uspech
          content:
            application/json:
              schema:
                $ref: './json-schema/event.schema.json'
              example:
                id: e1
                venue_id: v1
                performer_id: p1
                date: '2026-08-14'
                time: '18:00'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
components:
  parameters:
    VenueIdPath:
      name: id
      in: path
      required: true
      description: ID sceny ve tvaru vN.
      schema:
        type: string
        pattern: '^v[1-9]\d*$'
    PerformerIdPath:
      name: id
      in: path
      required: true
      description: ID interpreta ve tvaru pN.
      schema:
        type: string
        pattern: '^p[1-9]\d*$'
    EventIdPath:
      name: id
      in: path
      required: true
      description: ID vystoupeni ve tvaru eN.
      schema:
        type: string
        pattern: '^e[1-9]\d*$'
    EventDayQuery:
      name: day
      in: query
      required: false
      description: Filtrovani podle dne festivalu.
      schema:
        type: string
        format: date
    VenueIdQuery:
      name: venueId
      in: query
      required: false
      description: Filtrovani podle sceny.
      schema:
        type: string
        pattern: '^v[1-9]\d*$'
    PerformerIdQuery:
      name: performerId
      in: query
      required: false
      description: Filtrovani podle interpreta.
      schema:
        type: string
        pattern: '^p[1-9]\d*$'
    PageQuery:
      name: page
      in: query
      required: false
      description: Cislo stranky.
      schema:
        type: integer
        minimum: 1
        default: 1
    PageSizeQuery:
      name: pageSize
      in: query
      required: false
      description: Velikost stranky.
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 60
  responses:
    BadRequest:
      description: Neplatny pozadavek.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error: bad_request
            message: Pozadavek nelze zpracovat.
            status: 400
    NotFound:
      description: Pozadovany zdroj nebyl nalezen.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error: not_found
            message: Pozadovany zaznam neexistuje.
            status: 404
  schemas:
    ErrorResponse:
      type: object
      additionalProperties: false
      required:
        - error
        - message
        - status
      properties:
        error:
          type: string
          enum: [bad_request, not_found]
        message:
          type: string
          minLength: 1
        status:
          type: integer
          enum: [400, 404]
